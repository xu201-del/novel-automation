<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 小说写作助手</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <h1>AI 小说写作助手</h1>
    <button class="btn primary" onclick="showCreateModal()">+ 新建作品</button>
  </header>

  <div id="novel-list" class="grid"></div>
</div>

<div id="create-modal" class="modal hidden">
  <div class="modal-box">
    <h2>新建作品</h2>
    <label>书名</label>
    <input id="new-title" type="text" placeholder="给你的作品起个名字">
    <label>类型</label>
    <input id="new-genre" type="text" placeholder="如：玄幻、都市、科幻、悬疑">
    <label>创作风格（可选）</label>
    <textarea id="new-style" rows="2" placeholder="如：轻松幽默、文笔细腻、快节奏爽文"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeCreateModal()">取消</button>
      <button class="btn primary" onclick="createNovel()">创建</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
